<svg viewBox="0 0 480 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cqGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B2EC9"/>
      <stop offset="100%" stop-color="#00C2D1"/>
    </linearGradient>
    <filter id="cqShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#3B1F87" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- code editor window -->
  <g filter="url(#cqShadow)">
    <rect x="30" y="30" width="420" height="300" rx="14" fill="#1B1035"/>
  </g>
  <!-- title bar -->
  <rect x="30" y="30" width="420" height="34" rx="14" fill="#251545"/>
  <rect x="30" y="50" width="420" height="14" fill="#251545"/>
  <circle cx="52" cy="47" r="5" fill="#FF5F57"/>
  <circle cx="70" cy="47" r="5" fill="#FEBC2E"/>
  <circle cx="88" cy="47" r="5" fill="#28C840"/>
  <text x="240" y="52" font-family="monospace" font-size="11" fill="#8B7FB8" text-anchor="middle">app.service.ts</text>

  <!-- code lines (syntax-highlighted blocks, abstracted as colored bars) -->
  <g font-family="monospace" font-size="12">
    <rect x="54" y="82" width="30" height="8" rx="2" fill="#00C2D1" opacity="0.8"/>
    <rect x="90" y="82" width="70" height="8" rx="2" fill="#9FF3FF" opacity="0.6"/>
    <rect x="54" y="102" width="18" height="8" rx="2" fill="#5B2EC9" opacity="0.9"/>
    <rect x="78" y="102" width="110" height="8" rx="2" fill="#C9B8F2" opacity="0.5"/>
    <rect x="70" y="122" width="55" height="8" rx="2" fill="#00C2D1" opacity="0.7"/>
    <rect x="130" y="122" width="90" height="8" rx="2" fill="#C9B8F2" opacity="0.5"/>
    <rect x="70" y="142" width="130" height="8" rx="2" fill="#9FF3FF" opacity="0.5"/>
    <rect x="54" y="162" width="20" height="8" rx="2" fill="#5B2EC9" opacity="0.9"/>
    <rect x="78" y="162" width="60" height="8" rx="2" fill="#C9B8F2" opacity="0.5"/>
    <rect x="90" y="182" width="95" height="8" rx="2" fill="#00C2D1" opacity="0.6"/>
    <rect x="54" y="202" width="16" height="8" rx="2" fill="#5B2EC9" opacity="0.9"/>
    <rect x="74" y="202" width="140" height="8" rx="2" fill="#C9B8F2" opacity="0.4"/>
  </g>

  <!-- inline "test passing" indicator within the editor -->
  <rect x="54" y="230" width="200" height="26" rx="6" fill="#0F3D2E"/>
  <path d="M 64 243 L 70 249 L 82 235" stroke="#28C840" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="92" y="247" font-family="monospace" font-size="11" fill="#5FE39A">32 tests passing</text>

  <!-- floating "Code Review Approved" card -->
  <g filter="url(#cqShadow)">
    <rect x="230" y="270" width="220" height="86" rx="16" fill="#FFFFFF"/>
  </g>
  <circle cx="260" cy="300" r="16" fill="url(#cqGrad1)"/>
  <path d="M 253 300 L 258 305 L 268 293" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="284" y="297" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1B1035">Code Review</text>
  <text x="284" y="313" font-family="Arial, sans-serif" font-size="12" fill="#00A9B7" font-weight="600">Approved</text>
  <rect x="248" y="330" width="184" height="6" rx="3" fill="#EFEAFB"/>
  <rect x="248" y="330" width="184" height="6" rx="3" fill="url(#cqGrad1)"/>

  <!-- decorative dots -->
  <circle cx="20" cy="20" r="4" fill="#5B2EC9" opacity="0.4"/>
  <circle cx="465" cy="360" r="4" fill="#00C2D1" opacity="0.5"/>
  <circle cx="20" cy="370" r="3" fill="#00C2D1" opacity="0.4"/>
</svg>
