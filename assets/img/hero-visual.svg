<svg viewBox="0 0 560 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hv2Grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B2EC9"/>
      <stop offset="100%" stop-color="#00C2D1"/>
    </linearGradient>
    <linearGradient id="hv2Grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B1F87"/>
      <stop offset="100%" stop-color="#1B1035"/>
    </linearGradient>
    <linearGradient id="hv2Grad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00A9B7"/>
      <stop offset="100%" stop-color="#9FF3FF"/>
    </linearGradient>
    <radialGradient id="hv2Glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00C2D1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00C2D1" stop-opacity="0"/>
    </radialGradient>
    <filter id="hv2Shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#3B1F87" flood-opacity="0.22"/>
    </filter>
    <filter id="hv2SoftGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="hv2Grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#5B2EC9" opacity="0.10"/>
    </pattern>
  </defs>

  <!-- ambient background -->
  <rect x="0" y="0" width="560" height="500" fill="url(#hv2Grid)"/>
  <circle cx="470" cy="90" r="120" fill="url(#hv2Glow)"/>
  <circle cx="60" cy="420" r="100" fill="url(#hv2Glow)"/>

  <!-- orbiting AI core (top right, ambient) -->
  <g transform="translate(486,70)">
    <circle r="34" fill="none" stroke="#00C2D1" stroke-width="1" opacity="0.35"/>
    <circle r="46" fill="none" stroke="#5B2EC9" stroke-width="1" opacity="0.22"/>
    <circle r="9" fill="url(#hv2Grad3)" filter="url(#hv2SoftGlow)"/>
    <circle r="3" fill="#FFFFFF"/>
    <animateTransform attributeName="transform" type="rotate" from="0 486 70" to="360 486 70" dur="18s" repeatCount="indefinite"/>
  </g>

  <!-- connector lines between panels -->
  <path d="M 150 165 C 190 165 190 210 220 220" stroke="#C9B8F2" stroke-width="1.5" stroke-dasharray="3 5" fill="none" opacity="0.7"/>
  <path d="M 400 300 C 420 320 400 340 380 355" stroke="#9FF3FF" stroke-width="1.5" stroke-dasharray="3 5" fill="none" opacity="0.7"/>
  <circle r="3" fill="#00C2D1"><animateMotion dur="2.4s" repeatCount="indefinite" path="M 150 165 C 190 165 190 210 220 220"/></circle>
  <circle r="3" fill="#5B2EC9"><animateMotion dur="2.1s" begin="0.6s" repeatCount="indefinite" path="M 400 300 C 420 320 400 340 380 355"/></circle>

  <!-- PANEL A: code editor (back layer) -->
  <g filter="url(#hv2Shadow)">
    <rect x="18" y="60" width="230" height="150" rx="14" fill="url(#hv2Grad2)"/>
  </g>
  <rect x="18" y="60" width="230" height="28" rx="14" fill="#251545"/>
  <rect x="18" y="74" width="230" height="14" fill="#251545"/>
  <circle cx="36" cy="74" r="4" fill="#FF5F57"/>
  <circle cx="50" cy="74" r="4" fill="#FEBC2E"/>
  <circle cx="64" cy="74" r="4" fill="#28C840"/>
  <text x="133" y="78" font-family="monospace" font-size="9" fill="#8B7FB8" text-anchor="middle">deploy.sh</text>
  <g font-family="monospace">
    <rect x="34" y="104" width="26" height="6" rx="2" fill="#00C2D1" opacity="0.85"/>
    <rect x="64" y="104" width="60" height="6" rx="2" fill="#9FF3FF" opacity="0.55"/>
    <rect x="34" y="120" width="16" height="6" rx="2" fill="#5B2EC9" opacity="0.9"/>
    <rect x="54" y="120" width="90" height="6" rx="2" fill="#C9B8F2" opacity="0.45"/>
    <rect x="50" y="136" width="70" height="6" rx="2" fill="#00C2D1" opacity="0.7"/>
    <rect x="34" y="152" width="18" height="6" rx="2" fill="#5B2EC9" opacity="0.9"/>
    <rect x="56" y="152" width="50" height="6" rx="2" fill="#C9B8F2" opacity="0.45"/>
  </g>
  <rect x="34" y="172" width="164" height="20" rx="5" fill="#0F3D2E"/>
  <path d="M 42 182 L 47 187 L 57 175" stroke="#28C840" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="65" y="186" font-family="monospace" font-size="9" fill="#5FE39A">Build passed</text>

  <!-- PANEL B: analytics dashboard (main/largest) -->
  <g filter="url(#hv2Shadow)">
    <rect x="140" y="150" width="360" height="230" rx="18" fill="#FFFFFF"/>
  </g>
  <circle cx="166" cy="176" r="4" fill="#E4E0F2"/>
  <circle cx="180" cy="176" r="4" fill="#E4E0F2"/>
  <circle cx="194" cy="176" r="4" fill="#E4E0F2"/>
  <rect x="400" y="168" width="80" height="16" rx="8" fill="#F0EDFA"/>
  <text x="440" y="179" font-family="Arial, sans-serif" font-size="9" fill="#5B2EC9" text-anchor="middle" font-weight="700">LIVE</text>

  <rect x="164" y="200" width="130" height="30" rx="8" fill="#F5F3FB"/>
  <text x="176" y="220" font-family="monospace" font-size="13" fill="#5B2EC9" font-weight="700">+62% EFFICIENCY</text>

  <!-- bars -->
  <rect x="166" y="300" width="26" height="60" rx="4" fill="#EAE5F7"/>
  <rect x="200" y="270" width="26" height="90" rx="4" fill="url(#hv2Grad1)"/>
  <rect x="234" y="315" width="26" height="45" rx="4" fill="#EAE5F7"/>
  <rect x="268" y="248" width="26" height="112" rx="4" fill="url(#hv2Grad1)"/>
  <rect x="302" y="290" width="26" height="70" rx="4" fill="#EAE5F7"/>

  <!-- trend line -->
  <polyline points="350,340 378,300 404,318 432,255 460,270" fill="none" stroke="url(#hv2Grad1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="432" cy="255" r="5" fill="#00C2D1"/>
  <circle cx="432" cy="255" r="9" fill="#00C2D1" opacity="0.25"/>

  <text x="166" y="345" font-family="monospace" font-size="8" fill="#A8A0C0">Q1</text>
  <text x="200" y="345" font-family="monospace" font-size="8" fill="#A8A0C0">Q2</text>
  <text x="234" y="345" font-family="monospace" font-size="8" fill="#A8A0C0">Q3</text>
  <text x="268" y="345" font-family="monospace" font-size="8" fill="#A8A0C0">Q4</text>

  <!-- PANEL C: AI assistant chat (front layer) -->
  <g filter="url(#hv2Shadow)">
    <rect x="222" y="330" width="240" height="130" rx="16" fill="url(#hv2Grad2)"/>
  </g>
  <circle cx="250" cy="358" r="14" fill="url(#hv2Grad3)"/>
  <path d="M 244 358 L 249 363 L 258 351" stroke="#1B1035" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="272" y="355" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="700">AI Assistant</text>
  <text x="272" y="369" font-family="Arial, sans-serif" font-size="9" fill="#9FF3FF">Analyzing workflow...</text>

  <rect x="238" y="384" width="180" height="10" rx="5" fill="#FFFFFF" opacity="0.10"/>
  <rect x="238" y="384" width="130" height="10" rx="5" fill="url(#hv2Grad3)"/>
  <rect x="238" y="402" width="150" height="8" rx="4" fill="#FFFFFF" opacity="0.14"/>

  <!-- typing indicator -->
  <circle cx="244" cy="428" r="3" fill="#9FF3FF"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/></circle>
  <circle cx="256" cy="428" r="3" fill="#9FF3FF"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0.2s" repeatCount="indefinite"/></circle>
  <circle cx="268" cy="428" r="3" fill="#9FF3FF"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0.4s" repeatCount="indefinite"/></circle>

  <!-- decorative floating dots -->
  <circle cx="30" cy="440" r="4" fill="#5B2EC9" opacity="0.4"/>
  <circle cx="520" cy="420" r="4" fill="#00C2D1" opacity="0.45"/>
  <circle cx="500" cy="480" r="3" fill="#5B2EC9" opacity="0.35"/>
</svg>
